name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  release:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: |
          pip install "python-semantic-release>=9.0,<10" build

      - name: debug git
        run: |
          git log --oneline -5
          git tag
          semantic-release --version

      - name: semantic release
        id: semantic-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          semantic-release version --print-tag
          semantic-release publish

